name: Zenny paper-trade tick

# Vercel Hobby tier only allows daily crons; we want every 15 minutes for the
# paper-trading runner. GitHub Actions schedules give us 5-minute granularity
# for free. This workflow simply POSTs to the Vercel endpoint with the
# CRON_SECRET bearer — the actual logic still lives in the deployed function.
#
# Note: GitHub Actions can delay scheduled jobs under load. Acceptable for
# paper trading — a missed tick is a missed analysis tick, not a missed trade
# (the next tick fetches fresh candles and catches up via DB state).

on:
  schedule:
    # Every 15 minutes, aligned to clock quarters (:00, :15, :30, :45).
    - cron: "*/15 * * * *"
  # Allow manual trigger from the Actions tab for ad-hoc testing.
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST paper-trade-tick
        env:
          APP_URL: ${{ secrets.PAPER_TRADE_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "PAPER_TRADE_APP_URL and CRON_SECRET secrets must be set."
            exit 1
          fi
          set -euo pipefail
          # -L follows redirects; -f fails on HTTP >= 400 so the workflow
          # surfaces deploy/auth issues. Body printed to logs for review.
          curl -fsSL -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$APP_URL/api/zenny/paper-trade-tick" \
            | tee tick.json
          echo
          echo "Tick complete."
